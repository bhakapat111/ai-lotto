<!DOCTYPE html>
<html>
<head>
  <title>AI ระบบคำนวณ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background:#eef2f7;
      text-align:center;
      padding:20px;
    }

    .box {
      background:white;
      padding:20px;
      width:520px;
      margin:auto;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    textarea, select {
      width:100%;
      padding:10px;
      margin-top:10px;
      border-radius:6px;
      border:1px solid #ddd;
    }

    button {
      margin-top:10px;
      width:100%;
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
    }

    .reset-btn {
      background:#dc3545;
    }

    .detail {
      margin-top:15px;
      text-align:left;
      background:#f7f7f7;
      padding:10px;
      border-radius:8px;
      white-space:pre-line;
      font-size:14px;
    }

    .date {
      font-size:16px;
      margin-bottom:10px;
    }

    @media (max-width:600px){
      .box{width:95%;}
    }
  </style>
</head>

<body>

<div class="box">

<h2>สูตรคำนวณ AI</h2>

<!-- 🔥 ของเดิม (ครบ + เพิ่มแล้ว) -->
<select id="type">
  <optgroup label="🇹🇭 หวยไทย">
    <option value="gov">รัฐบาล</option>
    <option value="baac">ธกส.</option>
    <option value="gsb">ออมสิน</option>
    <option value="thai_extra">ไทยพิเศษ</option>
    <option value="thai_vip">ไทย VIP</option>
  </optgroup>

  <optgroup label="🌏 หวยต่างประเทศ / ออนไลน์">
    <option value="noivip">นอยวี (ฮานอย VIP)</option>
    <option value="han">ฮานอย</option>
    <option value="han_special">ฮานอยพิเศษ</option>
    <option value="han_vip">ฮานอย VIP</option>
    <option value="lao">ลาวพัฒนา</option>
    <option value="laostar">ลาวสตาร์</option>
    <option value="laovip">ลาว VIP</option>
    <option value="laoextra">ลาว Extra</option>
    <option value="lao_special">ลาวพิเศษ</option>
    <option value="malay">มาเลย์</option>
    <option value="malay_vip">มาเลย์ VIP</option>
    <option value="sg">สิงคโปร์</option>
    <option value="sg_vip">สิงคโปร์ VIP</option>
  </optgroup>

  <optgroup label="➕ แบบย่อย (บางเว็บแยก)">
    <option value="noi">นอยธรรมดา</option>
    <option value="noi_special">นอยพิเศษ</option>
    <option value="noi_vip">นอย VIP</option>
    <option value="noi_hd">นอย HD</option>
    <option value="noi_tv">นอย TV</option>

    <option value="laotv">ลาว TV</option>
    <option value="laohd">ลาว HD</option>
    <option value="lao_old">ลาวย้อนหลัง</option>
    <option value="lao_vip_tv">ลาว VIP TV</option>

    <option value="hantv">ฮานอย TV</option>
    <option value="hanhd">ฮานอย HD</option>
    <option value="han_vip_tv">ฮานอย VIP TV</option>
  </optgroup>
</select>

<!-- 🔥 เพิ่ม: เลือกเวลา -->
<select id="time">
  <option value="morning">🌅 เช้า</option>
  <option value="afternoon">☀️ บ่าย</option>
  <option value="evening">🌙 เย็น</option>
</select>

<div class="date" id="today"></div>

<textarea id="input" placeholder="ใส่ข้อมูล เช่น:
16/6/2566 363820
17/6/2566 389299"></textarea>

<button onclick="analyze()">วิเคราะห์</button>
<button class="reset-btn" onclick="resetAll()">🔄 Reset ทั้งหมด</button>

<div id="detail" class="detail"></div>

</div>

<script>

// วันที่
function showToday(){
  const d = new Date();
  const days = ["อาทิตย์","จันทร์","อังคาร","พุธ","พฤหัส","ศุกร์","เสาร์"];
  const months = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"];
  let text = "วัน"+days[d.getDay()]+" ที่ "+d.getDate()+" เดือน "+months[d.getMonth()]+" พ.ศ. "+(d.getFullYear()+543);
  document.getElementById("today").innerText = text;
}
showToday();

// ❌ กรองเลขเบิ้ล
function isRepeat(num){
  return /^(\d)\1+$/.test(num);
}

// 🔑 key แยก (ฉลาด)
function getKey(){
  return "lotto_"+type.value+"_"+time.value;
}

// 🤖 auto เวลา
function autoTime(){
  let h = new Date().getHours();
  if(h<12) time.value="morning";
  else if(h<17) time.value="afternoon";
  else time.value="evening";
}

// 🤖 auto หวย (ง่าย ๆ)
function autoType(){
  let d = new Date().getDay();
  if(d==1||d==4) type.value="gov";
  else if(d==2||d==5) type.value="lao";
  else type.value="han";
}

// 💾 จำค่า
function saveSetting(){
  localStorage.setItem("type", type.value);
  localStorage.setItem("time", time.value);
}

function loadSetting(){
  if(localStorage.type) type.value=localStorage.type;
  if(localStorage.time) time.value=localStorage.time;
}

window.onload=function(){
  loadSetting();
  autoTime();
  autoType();
};

type.onchange=saveSetting;
time.onchange=saveSetting;

// 🔥 top
function topN(obj,n){
  return Object.entries(obj)
    .sort((a,b)=>b[1]-a[1])
    .filter(x=>!isRepeat(x[0]))
    .slice(0,n);
}

// 🤖 analyze
function analyze(){

  let input = document.getElementById("input").value;
  let nums = input.match(/\d+/g);
  if(!nums){ alert("ไม่มีตัวเลข"); return; }

  let digits=[];
  nums.forEach(n=>digits.push(...n.split("")));

  let old = JSON.parse(localStorage.getItem(getKey())||"[]");
  digits = digits.concat(old);

  let count={};
  digits.forEach(d=>count[d]=(count[d]||0)+1);

  let p3={},p4={},p5={},p6={};

  for(let i=0;i<digits.length;i++){

    if(i<=digits.length-3){
      let v=digits.slice(i,i+3).join("");
      if(!isRepeat(v)) p3[v]=(p3[v]||0)+1;
    }

    if(i<=digits.length-4){
      let v=digits.slice(i,i+4).join("");
      if(!isRepeat(v)) p4[v]=(p4[v]||0)+1;
    }

    if(i<=digits.length-5){
      let v=digits.slice(i,i+5).join("");
      if(!isRepeat(v)) p5[v]=(p5[v]||0)+1;
    }

    if(i<=digits.length-6){
      let v=digits.slice(i,i+6).join("");
      if(!isRepeat(v)) p6[v]=(p6[v]||0)+1;
    }
  }

  localStorage.setItem(getKey(), JSON.stringify(digits));

  let text = "📊 "+type.selectedOptions[0].text+" | "+time.selectedOptions[0].text+"\n\n";

  text += "🔥 เลขเด่น:\n"+topN(count,3).map(x=>x[0]).join(" ")+"\n\n";
  text += "📌 3 ตัว:\n"+topN(p3,6).map(x=>x[0]).join(" • ")+"\n\n";
  text += "📌 4 ตัว:\n"+topN(p4,6).map(x=>x[0]).join(" • ")+"\n\n";
  text += "📌 5 ตัว:\n"+topN(p5,5).map(x=>x[0]).join(" • ")+"\n\n";
  text += "📌 6 ตัว:\n"+topN(p6,3).map(x=>x[0]).join(" • ");

  document.getElementById("detail").innerText=text;
}

// 🔄 reset
function resetAll(){
  if(confirm("ล้างข้อมูลทั้งหมด?")){
    localStorage.clear();
    location.reload();
  }
}

</script>

</body>
</html>
