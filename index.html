<!DOCTYPE html>
<html>
<head>
  <title>AI ระบบคำนวณ</title>

  <!-- 📅 FullCalendar -->
  <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <!-- 📱 PWA META (เพิ่มเพื่อมือถือ + install) -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#007bff">
  <link rel="manifest" id="manifest-placeholder">

  <style>
    body {
      font-family: Arial;
      background:#eef2f7;
      text-align:center;
      padding:20px;
    }

    .box {
      background:white;
      padding:20px;
      width:520px;
      margin:auto;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    select, textarea, input {
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    textarea { height:120px; }

    button {
      margin-top:10px;
      width:100%;
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
    }

    .popup {
      display:none;
      position:fixed;
      top:25%;
      left:50%;
      transform:translate(-50%,-50%);
      background:white;
      padding:25px;
      font-size:22px;
      font-weight:bold;
      border-radius:10px;
      box-shadow:0 0 20px rgba(0,0,0,0.3);
      z-index:999;
    }

    #calendar { margin-top:20px; }

    .detail {
      margin-top:15px;
      text-align:left;
      background:#f7f7f7;
      padding:10px;
      border-radius:8px;
      white-space:pre-line;
      font-size:13px;
    }

    .admin-btn {
      position:fixed;
      bottom:10px;
      right:10px;
      background:black;
      color:white;
      padding:6px 8px;
      font-size:12px;
      border-radius:6px;
      cursor:pointer;
    }

    /* 📱 ปรับมือถือ */
    @media (max-width:600px){
      .box{width:95%;}
    }
  </style>
</head>

<body>

<div class="box">

<h2> สูตรคำนวณ By Bhakapat</h2>

<h3>💰 QR</h3>
<img src="Qr.png" width="200">

<input type="file" id="slip">
<button onclick="uploadSlip()">อัปโหลดสลิป</button>

<div id="status"></div>

<hr>

<select id="type">
  <option value="รัฐบาล">รัฐบาล</option>
  <option value="ออมสิน">ออมสิน</option>
  <option value="ธกส">ธกส</option>
  <option value="ลาวพัฒนา">ลาวพัฒนา</option>
  <option value="ลาวex">ลาวex</option>
  <option value="ฮานอย">ฮานอย</option>
  <option value="นิเคอิVIP">นิเคอิVIP</option>
</select>
  <textarea id="input" placeholder="ใส่ 10 วัน คั่นด้วย ,"></textarea>


<button onclick="analyze()">วิเคราะห์</button>

<div id="popup" class="popup"></div>

<div id="calendar"></div>

<div id="detail" class="detail"></div>

</div>

<!-- 👑 ADMIN -->
<div class="admin-btn" onclick="openAdmin()">Admin</div>

<div id="adminBox" style="display:none;position:fixed;top:20%;left:50%;transform:translate(-50%,-50%);background:white;padding:20px;border-radius:10px;">
  <h3>Admin Login</h3>
  <input id="u" placeholder="Username">
  <input id="p" type="password" placeholder="Password">
  <button onclick="loginAdmin()">Sign In</button>
</div>

<script>

let isUnlocked = false;
let isAdmin = false;

// 📤 slip
function uploadSlip() {
    let file = document.getElementById("slip").files[0];
    if (!file) return alert("เลือกสลิป");

    document.getElementById("status").innerText = "⏳ ตรวจสอบ...";

    setTimeout(()=>{
        isUnlocked = true;
        document.getElementById("status").innerText = "✔ พร้อมใช้งาน";
    },10000);
}

// 👑 admin
function openAdmin(){
    document.getElementById("adminBox").style.display="block";
}

function loginAdmin(){
    let u=document.getElementById("u").value;
    let p=document.getElementById("p").value;

    if(u==="123456" && p==="123456"){
        isAdmin=true;
        alert("Admin ON");
        document.getElementById("adminBox").style.display="none";
    } else {
        alert("ผิด");
    }
}

// 🔥 top
function topN(obj,n){
    return Object.entries(obj)
    .sort((a,b)=>b[1]-a[1])
    .map(x=>x[0])
    .slice(0,n);
}

// 🤖 analyze
function analyze(){

    if(!isUnlocked && !isAdmin){
        alert("ต้องปลดล็อกก่อน");
        return;
    }

    let type=document.getElementById("type").value;
    let input = document.getElementById("input").value || "";

    let days=input.split(",").filter(x=>x.trim()!=="");
    

    let digits=[];
    for(let d of days){
        for(let c of d){
            digits.push(c);
        }
    }

    let counter={};
    for(let x of digits){
        counter[x]=(counter[x]||0)+1;
    }

    let top=topN(counter,3);

    let p2={},p3={},p4={},p6={};

    for(let i=0;i<digits.length;i++){

        if(i<=digits.length-2)
        p2[digits[i]+digits[i+1]]=(p2[digits[i]+digits[i+1]]||0)+1;

        if(i<=digits.length-3)
        p3[digits[i]+digits[i+1]+digits[i+2]]=(p3[digits[i]+digits[i+1]+digits[i+2]]||0)+1;

        if(i<=digits.length-4)
        p4[digits[i]+digits[i+1]+digits[i+2]+digits[i+3]]=(p4[digits[i]+digits[i+1]+digits[i+2]+digits[i+3]]||0)+1;

        if(i<=digits.length-6){
            let s="";
            for(let j=0;j<6;j++) s+=digits[i+j];
            p6[s]=(p6[s]||0)+1;
        }
    }

    document.getElementById("popup").innerText =
        type + " 🔥 " + top.join(" ");
    document.getElementById("popup").style.display="block";

    let text="🔥 เลขเด่น:\n";
    text+=top.join(" ")+"\n\n";

    text+="📌 2 ตัว:\n"+topN(p2,8).join(" • ")+"\n\n";
    text+="📌 3 ตัว:\n"+topN(p3,6).join(" • ")+"\n\n";
    text+="📌 4 ตัว:\n"+topN(p4,5).join(" • ")+"\n\n";
    text+="📌 6 ตัว:\n"+topN(p6,3).join(" • ")+"\n\n";

    document.getElementById("detail").innerText=text;
}

// 📅 calendar
document.addEventListener("DOMContentLoaded",function(){

    let cal=new FullCalendar.Calendar(document.getElementById("calendar"),{
        initialView:"dayGridMonth",
        height:400,
        events:[
            {title:"AI หวย",start:"2026-04-21"}
        ]
    });

    cal.render();
});

</script>

<!-- 📱 PWA INSTALL (เพิ่มอย่างเดียว) -->
<script>
const manifest = {
  name: "AI ระบบคำนวณ",
  short_name: "AI หวย",
  start_url: ".",
  display: "standalone",
  background_color: "#ffffff",
  theme_color: "#007bff",
  icons: [
    {
      src: "https://cdn-icons-png.flaticon.com/512/3135/3135715.png",
      sizes: "192x192",
      type: "image/png"
    }
  ]
};

const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
const url = URL.createObjectURL(blob);
document.getElementById('manifest-placeholder').setAttribute('href', url);
</script>

</body>
</html>
