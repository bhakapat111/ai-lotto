<!DOCTYPE html>
<html>
<head>
  <title>AI ระบบคำนวณ</title>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial;
      background:#eef2f7;
      text-align:center;
      padding:20px;
    }

    .box {
      background:white;
      padding:20px;
      width:520px;
      margin:auto;
      border-radius:12px;
      box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    textarea, input {
      width:100%;
      padding:10px;
      margin-top:10px;
    }

    textarea { height:150px; }

    button {
      margin-top:10px;
      width:100%;
      padding:10px;
      background:#007bff;
      color:white;
      border:none;
      border-radius:6px;
    }

    .detail {
      margin-top:15px;
      text-align:left;
      background:#f7f7f7;
      padding:10px;
      border-radius:8px;
      white-space:pre-line;
      font-size:13px;
    }

    @media (max-width:600px){
      .box{width:95%;}
    }
  </style>
</head>

<body>

<div class="box">

<h2>📊 สูตรคำนวณ AI</h2>

<input type="text" id="today" placeholder="วันนี้ เช่น 21/04/2569">

<textarea id="input" placeholder="ใส่ข้อมูล เช่น
16/6/2566 363820
17/6/2566 389299"></textarea>

<button onclick="analyze()">วิเคราะห์</button>
<button onclick="resetData()">🔄 Reset</button>

<div id="detail" class="detail"></div>

</div>

<script>

// 🔥 กรองเลขเบิ้ล
function isRepeat(num){
  return /^(\d)\1+$/.test(num);
}

// 🔥 top
function topN(obj,n){
  return Object.entries(obj)
  .sort((a,b)=>b[1]-a[1])
  .map(x=>x[0])
  .filter(x=>!isRepeat(x))
  .slice(0,n);
}

// 🔄 reset
function resetData(){
  document.getElementById("input").value="";
  document.getElementById("detail").innerText="";
}

// 🤖 analyze
function analyze(){

  let today = document.getElementById("today").value;
  let input = document.getElementById("input").value;

  if(!today){
    alert("ใส่วันที่วันนี้ก่อน");
    return;
  }

  let lines = input.split("\n").filter(x=>x.trim()!="");

  let numbers=[];

  for(let l of lines){
    let match = l.match(/\d{6}/);
    if(match) numbers.push(match[0]);
  }

  let digits=[];

  for(let n of numbers){
    for(let d of n){
      digits.push(d);
    }
  }

  // 🔥 สถิติ
  let counter={};
  for(let d of digits){
    counter[d]=(counter[d]||0)+1;
  }

  let top = topN(counter,3);

  // 📌 pattern
  let p3={},p4={},p5={},p6={};

  for(let n of numbers){

    for(let i=0;i<n.length;i++){

      if(i<=n.length-3){
        let s=n.substring(i,i+3);
        p3[s]=(p3[s]||0)+1;
      }

      if(i<=n.length-4){
        let s=n.substring(i,i+4);
        p4[s]=(p4[s]||0)+1;
      }

      if(i<=n.length-5){
        let s=n.substring(i,i+5);
        p5[s]=(p5[s]||0)+1;
      }

      if(i<=n.length-6){
        let s=n.substring(i,i+6);
        p6[s]=(p6[s]||0)+1;
      }

    }
  }

  let text="📅 วันนี้: "+today+"\n\n";

  text+="🔥 เลขเด่น:\n";
  text+=top.join(" ")+"\n\n";

  text+="📌 3 ตัว:\n"+topN(p3,6).join(" • ")+"\n\n";
  text+="📌 4 ตัว:\n"+topN(p4,5).join(" • ")+"\n\n";
  text+="📌 5 ตัว:\n"+topN(p5,4).join(" • ")+"\n\n";
  text+="📌 6 ตัว:\n"+topN(p6,3).join(" • ")+"\n\n";

  document.getElementById("detail").innerText=text;
}

</script>

</body>
</html>
